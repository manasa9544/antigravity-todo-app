<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>
</head>
<body>

<h2>Todo List</h2>

<form method="POST">
    <input type="text" name="task" placeholder="Enter task">
    <button type="submit">Add</button>
</form>

<ul>
{% for task in tasks %}
    <li>
        {{ task }}
        <a href="/delete/{{ loop.index0 }}">Delete</a>
    </li>
{% endfor %}
</ul>

</body>
</html>
